# muxpilot configuration example
# Place this file at ~/.config/muxpilot/config.toml

[app]
# UI theme. Supported values include:
#   "textual-dark", "textual-light", "nord", "gruvbox"
theme = "textual-dark"

[watcher]
# Polling interval in seconds
poll_interval = 2.0

# Idle threshold in seconds before a pane is considered idle
idle_threshold = 10.0

# Prompt patterns (regular expressions)
# Specifying these completely REPLACES the default patterns.
# Uncomment and customize as needed.

# Default prompt patterns are:
#   '[$>?]\\s*$'          - shell prompt (bash/zsh etc.)
#   'In \\[\\d+\\]: '     - IPython / Jupyter
#   '(?i)\\(y/n\\)'       - Yes/No prompt (case-insensitive)

# prompt_patterns = [
#   '[$>?]\\s*$',
#   'In \\[\\d+\\]: ',
#   '(?i)\\(y/n\\)',
# ]

# Error patterns (regular expressions)
# Specifying these completely REPLACES the default patterns.

# Default error patterns are:
#   '(?i)Error|Exception|Traceback|FAILED|panic|Segmentation fault|FATAL'

# error_patterns = [
#   '(?i)Error|Exception|Traceback|FAILED|panic|Segmentation fault|FATAL',
# ]

[ui]
# Tree panel maximum width in characters.
# The tree panel will not grow wider than this value.
# Default: 60
tree_panel_max_width = 60

# Sidebar hide threshold in characters.
# When the terminal width is at or below this value, the detail panel (sidebar)
# is automatically hidden to give more space to the tree panel.
# Set to 0 to disable auto-hide.
# Default: 80
sidebar_hide_threshold = 80

[notifications]
# Show toast notifications when tmux polling fails.
# Set to false to suppress "tmux poll failed" messages during normal use.
poll_errors = true

# Cooldown period in seconds after a notification-triggered WAITING status.
# During this period, content changes will not clear the override.
# Default: 5.0
# notification_cooldown = 5.0

# Regex pattern that triggers WAITING_INPUT status on a pane.
# The notification message must contain both a pane id (e.g. %1) and
# a match for this pattern. Leave empty to disable.
# waiting_trigger_pattern = "WAITING"

[logging]
# Log level for the muxpilot log file (~/.config/muxpilot/muxpilot.log).
# Supported values: "DEBUG", "INFO", "WARNING", "ERROR"
# Default: "INFO"
level = "INFO"
